<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF3B7C" />
            <stop offset="50%" stop-color="#FF7A3D" />
            <stop offset="100%" stop-color="#FACC15" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.3" />
        </filter>
    </defs>
    
    <!-- Background -->
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)" />
    
    <!-- Floating Photos -->
    <g filter="url(#shadow)">
        <g transform="translate(60, 200) rotate(-18)">
            <rect x="0" y="0" width="160" height="210" rx="16" fill="#ffffff" />
            <rect x="12" y="12" width="136" height="140" rx="8" fill="#e2e8f0" />
            <circle cx="80" cy="82" r="30" fill="#94a3b8" />
        </g>
        <g transform="translate(260, 130) rotate(12)">
            <rect x="0" y="0" width="190" height="240" rx="16" fill="#ffffff" />
            <rect x="12" y="12" width="166" height="166" rx="8" fill="#fef08a" />
            <path d="M12 110 L60 60 L120 120 L178 80 L178 178 L12 178 Z" fill="#f87171" rx="8" />
        </g>
    </g>

    <!-- Anti-gravity Paper Plane -->
    <g transform="translate(140, 260) rotate(-25)" filter="url(#shadow)">
        <path d="M0,90 L240,0 L140,160 L90,110 Z" fill="#ffffff" />
        <path d="M0,90 L240,0 L90,110 Z" fill="#f1f5f9" />
        <path d="M90,110 L240,0 L120,130 Z" fill="#cbd5e1" />
    </g>

    <!-- Sparkles -->
    <circle cx="120" cy="90" r="8" fill="#ffffff" opacity="0.8" />
    <circle cx="420" cy="400" r="14" fill="#ffffff" opacity="0.5" />
    <circle cx="160" cy="430" r="6" fill="#ffffff" opacity="0.9" />
    <path d="M380,80 Q390,70 400,80 Q390,90 380,80 Z" fill="#ffffff" opacity="0.8"/>
</svg>
